#Local planner in ROS1 are now renamed as Controllers. Controllers are used to follow the global path and they publish to the velocity smoother which is used for collision avoidance. Setting up the configurations of local planner (ROS1)/ Controller (ROS2).


controller_server:
  ros__parameters:
    # controller server parameters (see Controller Server for more info)
    use_sim_time: True
    # odom_topic: /odometry/filtered

    # --- This controls the frequency at which the controller runs. A higher frequency gives the controller more frequent updates, leading to faster response times, which is beneficial for tight turns and high-speed adjustments.20.0 Hz for better responsiveness
    controller_frequency: 20.0 #20.0 #5.0

    # These parameters define the minimum thresholds for velocity along the x (linear), y (lateral), and theta (angular) axes. They prevent the robot from moving too slowly, which can cause it to stop prematurely or behave erratically. 
    min_x_velocity_threshold:  0.07 #0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001 #0.001

    #These plugins are used to check whether the robot is making progress toward the goal and whether it has reached the goal.
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    #progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5 #2.05 #0.5                              # if less value means tight turns which makes the path deviate from the global plan (give acc. to the mechanical constraint)
      movement_time_allowance: 30.0
  
    general_goal_checker:
      # stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.6
      yaw_goal_tolerance: 0.5 #6.28 #3.14                              # means the controller should try to achive the orientaion to match the global plan orinetaion. 
                                                                       # Large value means to less consider the orientation
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      # inceased time_steps, prune_distance and reduced batch_size to attempt to drive vehicle at 1m/s
      # vx_std increase was required to make the vehicle actually drive faster
      # as you decrease wz_std it makes the vehile drive better in a straight line but makes it not want to turn around when given goals behind its current pose
      # unknown why vy_max and vy_std are set for a diff drive vehicle

      #1. Number of time steps to consider when predicting the trajectory. A larger number of time steps will give the controller more foresight, allowing it to handle tight curves better, but at the cost of higher computation. For tight turns: Increase to about 65–80. For smooth straights: You can decrease to around 20–40 for faster responses. ----- Range: 40–80 (for optimal tight turns and smooth runs)
      time_steps: 70 #80 #65

      #2. The time step between each prediction in the trajectory. A smaller dt allows for more precise control but increases computational demand. It’s important for sharp curves and maintaining smooth movement on straights.Range: Between 0.05 to 0.1. For tight turns: Use around 0.05 for finer control.For straights: Use up to 0.1 for faster optimization. Suggested Range: 0.05–0.1.
      model_dt: 0.05

      #3. The number of trajectories sampled during the optimization process. Larger batch sizes provide more candidate trajectories, improving the robustness of the controller, but at a higher computational cost. Range: Between 1000 and 3000. For tight turns: Higher batch size like 1800–2500 will improve stability in complex maneuvers. For smooth straights: You can use a lower batch size like 1000–1500 for faster calculation. Suggested Range: 1500–2500.
      batch_size: 1600 #2200 #1800

      #4. The standard deviation of the velocity in the forward direction (x-axis). This controls the exploration of forward velocities. A higher value allows for more variability in velocity. Range: Between 0.2 and 0.6. For tight turns: Increase to around 0.4–0.6 to allow for more flexibility in speed during turns. For straights: Keep this lower, around 0.2–0.3, to avoid jerky motions while driving straight. Suggested Range: 0.3–0.6.
      vx_std: 0.3 #0.6 #0.4                       # variability in forward trajectory velocities, allows the control to more trajectories velocitties in forward

      # unknown why vy_max and vy_std are set for a diff drive vehicle
      # vy_std: 0.0

      wz_std: 0.2

      #5. The maximum and minimum velocity limits in the forward direction. These limits control how fast the robot can move forward. Range: Typically between 0.2 and 1.0 for vx_max; vx_min should be negative and closer to -0.5 to allow reverse motion. For tight turns: You might want to limit to around 0.3–0.6 to avoid overshooting turns. For straights: Set vx_max to 0.8–1.0 for faster forward motion. Suggested Range: vx_max: 0.4–1.0, vx_min: -0.3–-0.5.
      vx_max: 0.2 #0.2
      vx_min: -0.2
#-----------------------------------------------------
      # unknown why vy_max and vy_std are set for a diff drive vehicle
      # vy_max: 0.5

      #6. The maximum angular velocity (rate of turn). This is crucial for controlling the robot's ability to turn. Higher values allow for faster turns, which is needed for tight curves.Range: Between 1.0 and 2.5. For tight turns: Use 1.5–2.0 to allow the robot to turn faster. For straights: Keep this lower at 1.0 to avoid unnecessary rotations while driving straight. Suggested Range: 1.0–2.0.
      wz_max: 1.2 #1.9

      #7. ax_max and ax_min: The maximum and minimum linear acceleration. These parameters control the acceleration limits in the forward direction, affecting how quickly the robot speeds up or slows down. Range: Between 2.0 and 5.0 for ax_max, with ax_min being negative and around -2.0 to -3.0. For tight turns: Use a lower ax_max (around 2.5–3.0) to prevent overshooting turns and causing instability. For straights: Increase ax_max to around 4.0–5.0 for smoother, more controlled acceleration on straight paths.Suggested Range: ax_max: 2.0–5.0, ax_min: -2.0–-3.0.
      ax_max: 3.0 #5.0 #2.5
      ax_min: -2.5


      iteration_count: 1

      #8. The distance threshold used to prune trajectories that are too far from the optimal path. This is important for ensuring that the controller focuses on feasible and optimal paths while ignoring extreme trajectories. Range: Typically between 1.0 and 2.5. For tight turns: Use 1.5–2.0 to ensure that trajectories for sharp turns are considered. For straights: A value closer to 1.0 can be used for straighter paths. Suggested Range: 1.0–2.0.
      prune_distance: 1.5 #2.0

      transform_tolerance: 0.1

      #9. Controls the exploration vs. exploitation balance. A lower temperature focuses more on exploitation, whereas a higher value encourages exploration. A higher temperature helps in more exploration of diverse trajectories, which can help with tight curves. Range: Between 0.1 and 0.5. For tight turns: Use 0.3–0.5 for more exploration and better handling of turns. For straights: Keep it lower at 0.1–0.2 for smooth driving. Suggested Range: 0.2–0.5.
      temperature: 0.4 #0.3

      # This parameter is related to the cost function used in the MPPI controller to balance the trade-off between exploration and exploitation. A lower gamma encourages the controller to focus more on short-term rewards, which is useful for making fast, reactive decisions, especially in tight environments.Suggested Range: 0.01–0.05. Too high: The robot might focus too much on long-term goals, missing out on immediate obstacles or tight turns.Too low: It may become too reactive, leading to over-corrections and erratic behavior. Value of 0.015 is a reasonable starting point, balancing exploration and exploitation.
      gamma: 0.010 #0.015 

      #Controls whether to visualize the trajectories or not. This is useful for debugging or understanding how the robot is planning its movements. Keep it as false during regular operation, as visualization is computationally expensive and is not needed in production. For testing and development, set it to true to see the optimization steps.
      visualize: true # prev false

      #This defines how often the MPPI controller should reset its trajectory planning, in seconds. A short reset period means that the controller frequently updates its trajectory predictions, while a long reset period allows for longer, more stable paths. Suggested Range: 1.0 (default) to 2.0 (if needed for more stability).If set too low: The controller might be too reactive and constantly adjust its plans, leading to inefficiency. If set too high: The robot may not adapt well to sudden changes in the environment. Default of 1.0 is typically good for Humble.
      reset_period: 1.0 # (only in Humble)
      
      TrajectoryVisualizer:
      trajectory_step: 5
      time_step: 3

      #Controls whether to regenerate random noise during trajectory optimization. Setting this to true ensures the controller explores different possible trajectories (helpful for better exploration of different paths). Suggested Value: false if you want to avoid recalculating noise each time, speeding up optimization. For smoother behavior: Keeping this false is usually fine unless you want more exploration (during development or testing).
      regenerate_noises: false
      
      enforce_path_inversion: true                              # to have car like behaviour (three point goals)

      #This ensures the robot maintains a car-like behavior (i.e., it should make smooth three-point turns when reversing). It’s important for robots that need to reverse and make U-turns, as it forces the robot to drive in a way that makes sense for its geometry (such as avoiding sharp turns in tight spaces).Suggested Value: true for more car-like behavior, especially useful in narrow spaces. If false: The robot may attempt unreasonable turns or reverse maneuvers. For tight turns, this setting helps the robot navigate reverse maneuvers smoothly, without instability.
      inversion_xy_tolerance: 0.5
      inversion_yaw_tolerance: 3.14



      # --------------------------------------Motion Model and Ackermann Constraints----------------------------------------------------------
      motion_model: "Ackermann"
      AckermannConstraints:
        min_turning_r: 2.05
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      


      #----------------------------------------Critics Configuration-------------------------------------------------------------------------------
      critics: ["ConstraintCritic", "ObstaclesCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic"]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      # PreferForwardCritic:
      #   # increased cost_power to 2 to force vehicle to drive forwards along long paths after increasing max speed
      #   #  - this causes failures when operating in a narrow workspace and would crash the vehicle by forcing it to turn around when it can't!
      #   # increased threshold_to_consider to allow vehicle to back up over short distances
      #   enabled: true
      #   cost_power: 2
      #   cost_weight: 4.0
      #   threshold_to_consider: 2.0
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 1.5
        critical_weight: 20.0
        consider_footprint: false
        collision_cost: 10000.0
        collision_margin_distance: 0.1
        near_goal_distance: 0.5
        # inflation_radius: 0.55 # (only in Humble)
        # cost_scaling_factor: 10.0 # (only in Humble)
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 3
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: true
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 40.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        # increased offset_from_furthest to default value to help reduce the vehicle oscillating along the path
        enabled: true
        cost_power: 1
        cost_weight: 30.0 #2.0
        offset_from_furthest: 20
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0
      
controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False
#local costmap configurations
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      track_unknown_space: true
      # unknown_cost_value: 250
      # lethal_cost_threshold: 150
      width: 3
      height: 3
      resolution: 0.08 #0.25
      footprint: "[[-0.76, -0.4], [0.76, -0.4], [0.76, 0.4], [-0.76, 0.4]]"  # [right bottom, right top , left top ,left bottom]
      #robot_radius: 0.5
      plugins: ["obstacle_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 0.8 #2.1 #3.0 #1.0
        inflation_radius: 0.22 #1.8 #1.2 #0.55
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 3.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          raytrace_min_range: 0.3
          obstacle_max_range: 5.0
          obstacle_min_range: 0.3
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      always_send_full_costmap: True
  local_costmap_client:
    ros__parameters:
      use_sim_time: False
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False
#global costmap configurations
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      width: 50
      height: 50
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      footprint: "[[-0.76, -0.4], [0.76, -0.4], [0.76, 0.4], [-0.76, 0.4]]"  # [right bottom, right top , left top ,left bottom]
      #robot_radius: 0.5
      rolling_window: false
      resolution: 0.05
      track_unknown_space: true
      # unknown_cost_value: 250 #120
      # lethal_cost_threshold: 150
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      # plugins: ["static_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 3.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 6.0 #6.0
          raytrace_min_range: 0.3 #0.0
          obstacle_max_range: 5.0 #3.0
          obstacle_min_range: 0.3 #0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        subscribe_to_updates: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 0.8 #4.58 #1.5 #1.0
        inflation_radius: 0.38 #0.25 #1.6 #0.66 #0.55
      always_send_full_costmap: True
  global_costmap_client:
    ros__parameters:
      use_sim_time: False
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False

planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]
    use_sim_time: False

    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      downsample_costmap: false           # whether or not to downsample the map
      downsampling_factor: 1              # multiplier for the resolution of the costmap layer (e.g. 2 on a 5cm costmap would be 10cm)
      tolerance: 0.3 # 0.25                     # dist-to-goal heuristic cost (distance) for valid tolerance endpoints if exact goal cannot be found.
      allow_unknown: true
      cost_scaling_factor: 0.9
     
      max_iterations: 1000000             # maximum total iterations to search for before failing (in case unreachable), set to -1 to disable
      max_on_approach_iterations: 1000    # Maximum number of iterations after within tolerances to continue to try to find exact solution
      max_planning_time: 10.0              # max time in s for planner to plan, smooth
      motion_model_for_search: "DUBIN" #"DUBIN"    # Hybrid-A* DUBIN, REEDS_SHEPP
      angle_quantization_bins: 72         # Number of angle bins for search
      analytic_expansion_ratio: 3.5       # The ratio to attempt analytic expansions during search for final approach.
      analytic_expansion_max_length: 3.0  # For Hybrid/Lattice nodes: The maximum length of the analytic expansion to be considered valid to prevent unsafe shortcutting
      minimum_turning_radius: 2.05 #0.5       # minimum turning radius in m of path / vehicle
      reverse_penalty: 1.0                # Penalty to apply if motion is reversing, must be => 1
      change_penalty: 0.1 # 0.8                 # Penalty to apply if motion is changing directions (L to R), must be >= 0
      non_straight_penalty: 2.0           # Penalty to apply if motion is non-straight, must be => 1
      cost_penalty: 1.8 #1.3                   # Penalty to apply to higher cost areas when adding into the obstacle map dynamic programming distance expansion heuristic. This drives the robot more towards the center of passages. A value between 1.3 - 3.5 is reasonable.
      retrospective_penalty: 0.015
      lookup_table_size: 20.0             # Size of the dubin/reeds-sheep distance window to cache, in meters.
      cache_obstacle_heuristic: false     # Cache the obstacle map dynamic programming distance expansion heuristic between subsiquent replannings of the same goal location. Dramatically speeds up replanning performance (40x) if costmap is largely static.
      smooth_path: True                   # If true, does a simple and quick smoothing post-processing to the path
      viz_expansions: False                   

      smoother:
        max_iterations: 1000
        w_smooth: 0.2 #1.0 #0.3
        w_data: 0.5 #1.0 #0.2
        tolerance: 1.0e-10
        do_refinement: true
        refinement_num: 2
        
planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False
    
    
#the map_server package has been changed to nav2_map_server which implements a server to handle the map load request and host a map topic. It has a map saver server running in background which saves the maps according to the requests. There are numerous parameters for the nav2_map_server. look at: https://navigation.ros.org/configuration/packages/configuring-map-server.html

map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: "maps/Sim_1.yaml"

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.0
    occupied_thresh_default: 0.0
    map_subscribe_transient_local: True

##behavior server configurations
behavior_server:
  ros__parameters:
    use_sim_time: False
    local_costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_costmap_topic: global_costmap/costmap_raw
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    
    wait:
      plugin: "nav2_behaviors/Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_timeout: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2
robot_state_publisher:
  ros__parameters:
    use_sim_time: False  

#add waypoint following parameters
waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200